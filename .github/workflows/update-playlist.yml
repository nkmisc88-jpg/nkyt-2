name: Update YouTube Live M3U8 Playlist
permissions:
  contents: write

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/*.yml'

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ffmpeg
          pip install --upgrade pip
          pip install --upgrade yt-dlp
          yt-dlp --version
          ffmpeg -version | head -n1

      - name: Generate M3U8 playlist
        id: generate
        run: |
          echo "🎬 Generating YouTube Live M3U8 Playlist..."
          
          if [ ! -f "streams.txt" ]; then
            echo "❌ streams.txt not found!"
            exit 1
          fi
          
          echo "#EXTM3U" > streams.m3u8
          echo "#EXT-X-VERSION:3" >> streams.m3u8
          echo "# Auto-generated YouTube Live M3U8 Playlist" >> streams.m3u8
          echo "# Generated: $(date -u '+%Y-%m-%d %H:%M UTC')" >> streams.m3u8
          echo "" >> streams.m3u8
          
          ACTIVE_STREAMS=0
          TOTAL_STREAMS=0
          
          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "${line// }" ]] && continue
            
            url=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            
            if [ -n "$url" ]; then
              TOTAL_STREAMS=$((TOTAL_STREAMS + 1))
              echo ""
              echo "🔍 Checking: $url"
              
              if info=$(yt-dlp --socket-timeout 30 --geo-bypass -J "$url" 2>/dev/null); then
                title=$(echo "$info" | jq -r '.title // "Unknown Stream"')
                channel=$(echo "$info" | jq -r '.channel // "YouTube"')
                is_live=$(echo "$info" | jq -r '.is_live // false')
                duration=$(echo "$info" | jq -r '.duration // 0')
                
                if [ "$is_live" = "true" ] || [ "$duration" = "null" ] || [ "$duration" = "0" ]; then
                  echo "  ✅ Stream is LIVE!"
                  ACTIVE_STREAMS=$((ACTIVE_STREAMS + 1))
                  channel_id=$(echo "$channel" | tr -d ' ' | tr -cd '[:alnum:]')
                  
                  direct_url=$(yt-dlp --socket-timeout 15 -g -f "best" "$url" 2>/dev/null | head -1)
                  final_url="${direct_url:-$url}"
                  
                  echo "" >> streams.m3u8
                  echo "#EXTINF:-1 tvg-id=\"${channel_id}.yt\" group-title=\"News\",${title} (Live)" >> streams.m3u8
                  echo "$final_url" >> streams.m3u8
                else
                  echo "  ⚠️  Stream is not live"
                  channel_id=$(echo "$channel" | tr -d ' ' | tr -cd '[:alnum:]')
                  echo "" >> streams.m3u8
                  echo "#EXTINF:-1 tvg-id=\"${channel_id}.yt\" group-title=\"News\",${title} (Offline)" >> streams.m3u8
                  echo "# Stream currently unavailable" >> streams.m3u8
                fi
              else
                echo "  ❌ Failed to fetch info"
                channel_name=$(echo "$url" | grep -o '@[^/]*' | tr -d '@' || echo "Unknown")
                echo "" >> streams.m3u8
                echo "#EXTINF:-1 tvg-id=\"${channel_name}.yt\" group-title=\"News\",${channel_name} (Error)" >> streams.m3u8
                echo "# Failed to fetch info for: $url" >> streams.m3u8
              fi
            fi
          done < streams.txt
          
          echo "" >> streams.m3u8
          echo "# Total streams: $TOTAL_STREAMS" >> streams.m3u8
          echo "# Active live streams: $ACTIVE_STREAMS" >> streams.m3u8
          echo "# Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')" >> streams.m3u8
          
          echo "active=$ACTIVE_STREAMS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL_STREAMS" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add streams.m3u8 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "🔄 Update live playlists - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
            git push origin HEAD:${GITHUB_REF#refs/heads/}
            echo "✅ Successfully pushed changes."
          else
            echo "ℹ️ No changes to commit."
          fi
