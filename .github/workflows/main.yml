      - name: Generate playlist
        run: |
          set -x  # Print each command
          echo "#EXTM3U" > streams.m3u8
          echo "# Generated: $(date -u)" >> streams.m3u8
          echo "" >> streams.m3u8

          TOTAL=0
          ACTIVE=0

          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "${line// }" ]] && continue

            URL=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            [ -z "$URL" ] && continue

            TOTAL=$((TOTAL + 1))
            echo ""
            echo "📺 [$TOTAL] Processing: $URL"

            NAME=$(echo "$URL" | grep -o '@[^/]*' | tr -d '@' || echo "Channel $TOTAL")

            STREAM_URL=""

            if [ -f "cookies.txt" ]; then
              echo "  🔑 Cookies file exists, testing..."
              
              # Test if cookies file is readable and has content
              echo "  📄 Cookies file stats:"
              ls -la cookies.txt
              echo "  First line of cookies: $(head -1 cookies.txt)"
              
              # Try a simple test first
              echo "  🔍 Testing yt-dlp with cookies..."
              yt-dlp --cookies cookies.txt --simulate --print filename "$URL" 2>&1 || echo "  ❌ yt-dlp test failed"
              
              # Get video ID with error capture
              VIDEO_ID=$(yt-dlp --cookies cookies.txt --get-id "$URL" 2>&1)
              EXIT_CODE=$?
              
              echo "  Exit code: $EXIT_CODE"
              echo "  Output: $VIDEO_ID"
              
              if [ $EXIT_CODE -eq 0 ] && [ -n "$VIDEO_ID" ] && [[ "$VIDEO_ID" != *"ERROR"* ]]; then
                echo "  ✅ Got video ID: $VIDEO_ID"
                
                # Try formats
                for fmt in 301 300 best; do
                  STREAM_URL=$(yt-dlp --cookies cookies.txt -f $fmt -g "https://youtube.com/watch?v=$VIDEO_ID" 2>/dev/null | head -1)
                  if [ -n "$STREAM_URL" ]; then
                    echo "    ✅ Got format $fmt"
                    break
                  fi
                done
              else
                echo "  ❌ Failed to get video ID"
                echo "  Error details: $VIDEO_ID"
              fi
            else
              echo "  ⚠️ cookies.txt not found"
            fi

            if [ -n "$STREAM_URL" ]; then
              echo "  ✅ Got direct stream URL!"
              ACTIVE=$((ACTIVE + 1))
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$NAME (Live)" >> streams.m3u8
              echo "$STREAM_URL" >> streams.m3u8
            else
              echo "  ⚠️ Using channel URL as fallback"
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$NAME (via YouTube)" >> streams.m3u8
              echo "$URL" >> streams.m3u8
            fi

            sleep 1

          done < streams.txt

          echo "" >> streams.m3u8
          echo "# Summary: $ACTIVE/$TOTAL direct streams" >> streams.m3u8
          echo "# Updated: $(date -u)" >> streams.m3u8
