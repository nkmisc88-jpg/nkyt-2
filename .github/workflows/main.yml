name: YouTube Live M3U8 Generator
run-name: Generate HD Playlist 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'streams.txt'
      - 'generate.py'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Setup Python
        run: pip install --upgrade pip yt-dlp requests

      - name: Setup Cloudflare WARP
        continue-on-error: true
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          wgcf register --accept-tos
          wgcf generate
          
          # FIX: Stop the 'nft' hang by disabling routing table management
          sed -i '/Table = auto/d' wgcf-profile.conf
          echo "Table = off" >> wgcf-profile.conf
          
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          sudo wg-quick up /etc/wireguard/wgcf.conf || true
          
          echo "✅ WARP setup complete. Testing connection..."
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E "ip|loc"

      - name: Load Cookies Secret
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ ! -z "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
            echo "✅ Cookies file created from Secrets"
          else
            echo "⚠️ No COOKIES_TXT secret found, running in Anonymous mode"
          fi

      - name: Run Generator
        run: python generate.py

      - name: Commit and push
        env:
          PAT_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Auto-update playlists [$(date -u +%H:%M)]"
            git pull --rebase origin main
            git push "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          fi

      - name: Cleanup
        if: always()
        run: rm -f cookies.txt wgcf-profile.conf wgcf-account.toml 2>/dev/null || true
