name: YouTube Live M3U8 Generator
run-name: Generate Streamlink-Compatible Playlist with Deno 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Install Deno (JavaScript Runtime)
        run: |
          echo "📦 Installing Deno..."
          curl -fsSL https://deno.land/install.sh | sh
          echo "/home/runner/.deno/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.deno/bin:$PATH"
          echo "✅ Deno version: $(deno --version | head -1)"
          echo "✅ Deno location: $(which deno)"

      - name: Create cookies file securely
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          install -m 600 /dev/null cookies.txt
          echo "$COOKIES" > cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Diagnostic test
        run: |
          echo "🔍 Testing first channel with verbose output..."
          FIRST_URL=$(grep -v '^#' streams.txt | head -1)
          echo "URL: $FIRST_URL"
          
          # Test with Deno and verbose output
          yt-dlp --cookies cookies.txt --verbose --dump-json "$FIRST_URL" 2>&1 | head -50 || echo "❌ yt-dlp test failed"

      - name: Generate Streamlink-compatible playlist
        id: generate
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          import sys
          from datetime import datetime, timezone

          def get_video_info(url, cookies_file):
              """Get video ID and quality info using yt-dlp with Deno support."""
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 30,
                  'retries': 3,
                  'extractor_args': {
                      'youtube': {
                          'player_client': ['android', 'web'],  # Try android client first (less bot detection)
                          'skip': ['hls', 'dash'],  # Skip some formats to speed up
                      }
                  }
              }
              
              try:
                  with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                      print(f"  Fetching info for: {url[:60]}...")
                      info = ydl.extract_info(url, download=False)
                      
                      if not info:
                          print(f"  ⚠️ No info returned")
                          return None, None, None
                      
                      video_id = info.get('id')
                      if not video_id:
                          print(f"  ⚠️ No video ID found")
                          return None, None, None
                      
                      print(f"  ✅ Got video ID: {video_id}")
                      
                      # Check if live
                      is_live = info.get('is_live', False)
                      live_status = info.get('live_status', '')
                      if not (is_live or live_status == 'is_live'):
                          print(f"  ⚠️ Not currently live")
                          return video_id, "offline", info.get('title', 'Unknown')
                      
                      # Get format info for quality detection
                      formats = info.get('formats', [])
                      video_formats = [f for f in formats if f.get('height') and f.get('vcodec') != 'none']
                      
                      if video_formats:
                          # Sort by height
                          video_formats.sort(key=lambda f: f.get('height', 0), reverse=True)
                          best_format = video_formats[0]
                          height = best_format.get('height', 0)
                          
                          # Determine quality tag
                          if height >= 1080:
                              quality = "1080p"
                          elif height >= 720:
                              quality = "720p"
                          elif height >= 480:
                              quality = "480p"
                          else:
                              quality = f"{height}p"
                          
                          fps = best_format.get('fps', '')
                          if fps and fps > 30:
                              quality += f"{int(fps)}"
                          
                          print(f"  ✅ Quality: {quality}")
                      else:
                          quality = "unknown"
                          print(f"  ⚠️ No video formats found")
                      
                      return video_id, quality, info.get('title', 'Unknown')
                          
              except yt_dlp.utils.DownloadError as e:
                  print(f"  ⚠️ yt-dlp download error: {str(e)[:200]}")
                  return None, None, None
              except Exception as e:
                  print(f"  ⚠️ Unexpected error: {str(e)[:200]}")
                  return None, None, None

          # Read streams.txt
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              sys.exit(1)

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          if not lines:
              print("⚠️ No streams found")
              sys.exit(0)

          m3u8 = [
              "#EXTM3U",
              "#EXT-X-VERSION:3",
              f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Total channels: {len(lines)}",
              "# Playlist optimized for Streamlink (pip install streamlink)",
              ""
          ]

          active = 0
          active_channels = []
          offline_channels = []
          error_channels = []

          for i, line in enumerate(lines, 1):
              print(f"\n📺 [{i}/{len(lines)}] Processing: {line[:60]}...")
              
              # Random delay to avoid rate limiting
              time.sleep(random.uniform(3, 6))
              
              # Extract channel name
              name_match = re.search(r'@([^/]+)', line)
              channel_name = name_match.group(1) if name_match else f"Channel{i}"
              channel_name = re.sub(r'[^\w\s-]', '', channel_name).strip()
              
              # Get video info
              video_id, quality, title = get_video_info(line, 'cookies.txt')
              
              if video_id:
                  youtube_url = f"https://www.youtube.com/watch?v={video_id}"
                  
                  if quality != "offline":
                      active += 1
                      active_channels.append(channel_name)
                      print(f"  ✅ Added: {channel_name} [{quality}]")
                      m3u8.append(f'#EXTINF:-1 tvg-id="{video_id}" tvg-name="{channel_name}" group-title="Nigeria News",{channel_name} [{quality}]')
                      m3u8.append(youtube_url)
                  else:
                      offline_channels.append(channel_name)
                      print(f"  ⚠️ Offline: {channel_name}")
                      m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="Nigeria News",{channel_name} [Offline]')
                      m3u8.append(line)
                  m3u8.append("")
              else:
                  error_channels.append(channel_name)
                  print(f"  ❌ Error: {channel_name}")
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="Nigeria News",{channel_name} [Error]')
                  m3u8.append(line)
                  m3u8.append("")

          # Add summary
          m3u8.extend([
              "",
              f"# Summary: {active}/{len(lines)} streams active",
              f"# Active: {', '.join(active_channels) if active_channels else 'None'}",
              f"# Offline: {len(offline_channels)}",
              f"# Errors: {len(error_channels)}",
              f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"
          ])

          with open('streams.m3u8', 'w', encoding='utf-8') as f:
              f.write('\n'.join(m3u8))

          # Save stats
          with open('stats.txt', 'w') as f:
              f.write(f"active={active}\n")
              f.write(f"total={len(lines)}\n")
              f.write(f"active_channels={','.join(active_channels)}\n")
              f.write(f"offline_channels={','.join(offline_channels)}\n")
              f.write(f"error_channels={','.join(error_channels)}\n")

          print(f"\n{'='*50}")
          print(f"📊 FINAL: {active}/{len(lines)} streams active")
          print(f"{'='*50}")

          PYTHON_EOF

          python generate.py

      - name: Load stats
        id: stats
        run: |
          if [ -f "stats.txt" ]; then
            source stats.txt
            echo "active=$active" >> $GITHUB_OUTPUT
            echo "total=$total" >> $GITHUB_OUTPUT
            echo "active_channels=$active_channels" >> $GITHUB_OUTPUT
            echo "offline_channels=$offline_channels" >> $GITHUB_OUTPUT
            echo "error_channels=$error_channels" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No stats file"
            echo "active=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate helper scripts
        run: |
          # Create Streamlink player script
          cat > play_with_streamlink.sh << 'EOF'
          #!/bin/bash
          # Streamlink Player for Nigeria News
          
          PLAYLIST="https://raw.githubusercontent.com/uticap/Youtube-to-M3u8/main/streams.m3u8"
          QUALITY="${1:-best}"
          
          echo "📺 Nigeria News Streams"
          echo "======================="
          echo "Quality options: best, 1080p, 720p, 480p"
          echo ""
          streamlink --player="vlc" "$PLAYLIST" "$QUALITY"
          EOF
          
          chmod +x play_with_streamlink.sh
          echo "✅ Helper script created"

      - name: Show playlist preview
        run: |
          echo ""
          echo "📄 Generated streams.m3u8:"
          echo "=========================="
          head -30 streams.m3u8
          echo "..."

      - name: Send Telegram Notification
        uses: cbrgm/telegram-github-action@v1
        if: success()
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            📺 *YouTube Playlist Updated*
            
            ✅ *Active Streams:* ${{ steps.stats.outputs.active }}/${{ steps.stats.outputs.total }}
            
            📡 *Live:* ${{ steps.stats.outputs.active_channels }}
            ⚫ *Offline:* ${{ steps.stats.outputs.offline_channels }}
            ❌ *Errors:* ${{ steps.stats.outputs.error_channels }}
            
            🔗 *URL:* https://raw.githubusercontent.com/${{ github.repository }}/main/streams.m3u8
        continue-on-error: true

      - name: Commit and push
        env:
          PAT_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Backup generated files
          cp streams.m3u8 streams.m3u8.backup 2>/dev/null || true
          cp play_with_streamlink.sh play_with_streamlink.sh.backup 2>/dev/null || true
          cp stats.txt stats.txt.backup 2>/dev/null || true
          
          # Get latest changes
          git fetch origin main
          
          # Reset to latest remote
          if git rev-parse origin/main >/dev/null 2>&1; then
            git reset --hard origin/main
          fi
          
          # Restore our files
          mv streams.m3u8.backup streams.m3u8 2>/dev/null || true
          mv play_with_streamlink.sh.backup play_with_streamlink.sh 2>/dev/null || true
          mv stats.txt.backup stats.txt 2>/dev/null || true
          
          # Make script executable
          chmod +x play_with_streamlink.sh 2>/dev/null || true
          
          # Add files
          git add -f streams.m3u8 play_with_streamlink.sh stats.txt
          
          # Check for changes
          if git diff --cached --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          # Commit and push
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)] - ${{ steps.stats.outputs.active }}/${{ steps.stats.outputs.total }} active"
          git push --force "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          echo "✅ Pushed"

      - name: Cleanup
        if: always()
        run: |
          rm -f cookies.txt stats.txt *.backup 2>/dev/null || true
          echo "🧹 Cleaned up"

      - name: Send failure notification
        if: failure()
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            ❌ *Workflow Failed*
            Repository: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
