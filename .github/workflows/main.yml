name: YouTube Live M3U8 Generator
run-name: Generate HD Playlist with Smart Quality Selection 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

# Enhanced permissions for private repo security
permissions:
  contents: write
  actions: read
  checks: read

env:
  PYTHONUNBUFFERED: "1"
  # Move proxy URL to secret for private repos (recommended)
  PROXY_BASE_URL: ${{ secrets.PROXY_BASE_URL || 'https://siteproxy.chidex4k43342.workers.dev/yourtube/' }}

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    # Prevent concurrent runs to avoid conflicts
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}
          # Ensure we don't persist credentials longer than needed
          persist-credentials: false

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Setup Cloudflare WARP
        continue-on-error: true
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools iptables
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          
          wgcf register --accept-tos
          wgcf generate
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          sudo wg-quick up /etc/wireguard/wgcf.conf || true
          
          echo "✅ WARP setup complete"

      - name: Create cookies file securely
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          # Secure file creation with restricted permissions
          install -m 600 /dev/null cookies.txt
          echo "$COOKIES" > cookies.txt
          # Mask sensitive cookie values in logs
          echo "::add-mask::$(echo "$COOKIES" | head -1 | cut -f7)"
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate HD playlist with smart quality selection
        id: generate
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          import sys
          from datetime import datetime, timezone

          # Use environment variable (can be secret in private repos)
          PROXY_BASE = os.environ.get('PROXY_BASE_URL', "https://siteproxy.chidex4k43342.workers.dev/yourtube/")

          def get_stream_url(url, cookies_file):
              """Get the stream URL by prioritizing highest vertical resolution."""
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 30,
                  'retries': 3,
                  'fragment_retries': 3,
                  'extractor_args': {
                      'youtube': {
                          'player_client': ['web', 'android'],
                          'player_skip': ['webpage', 'configs', 'js']
                      }
                  }
              }
              
              try:
                  with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                      info = ydl.extract_info(url, download=False)
                      
                      if not info:
                          return None, None, None
                      
                      video_id = info.get('id')
                      title = info.get('title', 'Unknown')
                      
                      # --- Quality Check ---
                      is_live = info.get('is_live', False)
                      live_status = info.get('live_status', '')
                      if not (is_live or live_status == 'is_live'):
                          print(f"  ⚠️ Not currently live (status: {live_status})")
                          return None, video_id, None
                      # ---------------------

                      formats = info.get('formats', [])
                      
                      # --- Find best video format by height ---
                      video_formats = [
                          f for f in formats 
                          if f.get('height') and f.get('url') and f.get('vcodec') != 'none'
                      ]
                      
                      if not video_formats:
                          print("  ⚠️ No suitable video formats found.")
                          return None, video_id, None

                      # Sort by height descending, then fps descending
                      video_formats.sort(key=lambda f: (f.get('height', 0), f.get('fps', 0)), reverse=True)
                      
                      # Select best available from priority list
                      best_format = None
                      target_heights = [1080, 720, 480]
                      
                      for target in target_heights:
                          for fmt in video_formats:
                              if fmt.get('height') == target:
                                  best_format = fmt
                                  break
                          if best_format:
                              break
                      
                      # Fallback to best available if no target matches
                      if not best_format:
                          best_format = video_formats[0]

                      if best_format:
                          height = best_format.get('height', 'N/A')
                          codec = best_format.get('vcodec', 'N/A')
                          fps = best_format.get('fps', '')
                          format_note = best_format.get('format_note', '')
                          
                          # Determine quality tag
                          quality_tag = f"{height}p"
                          if fps and fps > 30:
                              quality_tag += f"{int(fps)}"
                          
                          print(f"  ✅ Selected: {quality_tag} ({codec}, {format_note})")
                          
                          # Return format info dict for accurate quality tracking
                          fmt_info = {
                              'height': height,
                              'quality_tag': quality_tag
                          }
                          
                          return best_format['url'], video_id, fmt_info
                      else:
                          print(f"  ⚠️ Could not select a format.")
                          return None, video_id, None
                          
              except yt_dlp.utils.DownloadError as e:
                  print(f"  ⚠️ yt-dlp error: {str(e)[:150]}")
                  return None, None, None
              except Exception as e:
                  print(f"  ⚠️ Error: {str(e)[:150]}")
                  return None, None, None

          # Read streams.txt
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              sys.exit(0)

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          if not lines:
              print("⚠️ No streams found")
              sys.exit(0)

          m3u8 = [
              "#EXTM3U",
              "#EXT-X-VERSION:3",
              f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Total channels: {len(lines)}",
              ""
          ]

          active = 0
          quality_stats = {"1080p": 0, "720p": 0, "480p": 0, "other": 0}
          active_channels = []
          offline_channels = []
          error_channels = []

          for i, line in enumerate(lines, 1):
              print(f"\n📺 [{i}/{len(lines)}] Processing: {line}")
              
              # Random delay to avoid pattern detection (3-8 seconds)
              time.sleep(random.uniform(3, 8))
              
              stream_url, video_id, fmt_info = get_stream_url(line, 'cookies.txt')
              
              # Extract and sanitize channel name
              name_match = re.search(r'@([^/]+)', line)
              channel_name = name_match.group(1) if name_match else f"Channel{i}"
              # Remove special chars that break M3U8 parsers
              channel_name = re.sub(r'[^\w\s-]', '', channel_name).strip()
              
              if stream_url and video_id and fmt_info:
                  active += 1
                  active_channels.append(channel_name)
                  
                  # Use actual format height instead of string matching
                  height = fmt_info.get('height', 0)
                  if height >= 1080:
                      quality_stats["1080p"] += 1
                      quality_tag = fmt_info.get('quality_tag', '1080p')
                  elif height >= 720:
                      quality_stats["720p"] += 1
                      quality_tag = fmt_info.get('quality_tag', '720p')
                  elif height >= 480:
                      quality_stats["480p"] += 1
                      quality_tag = fmt_info.get('quality_tag', '480p')
                  else:
                      quality_stats["other"] += 1
                      quality_tag = fmt_info.get('quality_tag', f"{height}p")
                  
                  print(f"  ✅ SUCCESS: {quality_tag} stream")
                  
                  # Use direct stream URL for active streams
                  m3u8.append(f'#EXTINF:-1 tvg-id="{video_id}" tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} [{quality_tag}]')
                  m3u8.append(stream_url)
                  m3u8.append("")
                  
              elif video_id:
                  # Live but no stream URL extracted (offline/age-restricted)
                  print(f"  ⚠️ Channel offline or restricted, using fallback")
                  offline_channels.append(channel_name)
                  
                  # Fixed URL construction (no space)
                  proxied_url = f"{PROXY_BASE}https://www.youtube.com/watch?v={video_id}"
                  
                  m3u8.append(f'#EXTINF:-1 tvg-id="{video_id}" tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} [Offline]')
                  m3u8.append(proxied_url)
                  m3u8.append("")
              else:
                  # Complete failure to extract any info
                  print(f"  ❌ Failed to extract video ID")
                  error_channels.append(channel_name)
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} [Error]')
                  m3u8.append(line)  # Fallback to original URL
                  m3u8.append("")

          # Add summary comments
          m3u8.extend([
              "",
              f"# Summary: {active}/{len(lines)} streams active",
              f"# Quality: {quality_stats['1080p']}x1080p, {quality_stats['720p']}x720p, {quality_stats['480p']}x480p, {quality_stats['other']}xOther",
              f"# Offline: {len(offline_channels)}",
              f"# Errors: {len(error_channels)}",
              f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"
          ])

          # Write with UTF-8 encoding for international chars
          with open('streams.m3u8', 'w', encoding='utf-8') as f:
              f.write('\n'.join(m3u8))

          # Save stats for outputs
          with open('stats.txt', 'w') as f:
              f.write(f"active={active}\n")
              f.write(f"total={len(lines)}\n")
              f.write(f"quality_1080p={quality_stats['1080p']}\n")
              f.write(f"quality_720p={quality_stats['720p']}\n")
              f.write(f"quality_480p={quality_stats['480p']}\n")
              f.write(f"active_channels={','.join(active_channels)}\n")
              f.write(f"offline_channels={','.join(offline_channels)}\n")
              f.write(f"error_channels={','.join(error_channels)}\n")

          # Print summary
          print(f"\n{'='*50}")
          print(f"📊 FINAL: {active}/{len(lines)} streams active")
          print(f"📊 Quality: 1080p:{quality_stats['1080p']} 720p:{quality_stats['720p']} 480p:{quality_stats['480p']}")
          if offline_channels:
              print(f"⚫ Offline: {', '.join(offline_channels)}")
          if error_channels:
              print(f"❌ Errors: {', '.join(error_channels)}")
          print(f"{'='*50}")

          PYTHON_EOF

          python generate.py

      - name: Load stats
        id: stats
        run: |
          source stats.txt
          echo "active=$active" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "quality_1080p=$quality_1080p" >> $GITHUB_OUTPUT
          echo "quality_720p=$quality_720p" >> $GITHUB_OUTPUT
          echo "quality_480p=$quality_480p" >> $GITHUB_OUTPUT
          echo "active_channels=$active_channels" >> $GITHUB_OUTPUT
          echo "offline_channels=$offline_channels" >> $GITHUB_OUTPUT
          echo "error_channels=$error_channels" >> $GITHUB_OUTPUT

      - name: Validate and clean M3U8
        run: |
          # Remove any git conflict markers if they exist
          sed -i '/^<<<<<<< /d' streams.m3u8 2>/dev/null || true
          sed -i '/^=======/d' streams.m3u8 2>/dev/null || true
          sed -i '/^>>>>>>> /d' streams.m3u8 2>/dev/null || true
          
          # Remove duplicate lines while preserving order
          awk '!seen[$0]++' streams.m3u8 > streams_clean.m3u8 2>/dev/null || true
          mv streams_clean.m3u8 streams.m3u8 2>/dev/null || true
          
          # Validate M3U8 structure
          if ! grep -q "^#EXTM3U" streams.m3u8; then
            echo "❌ Invalid M3U8: Missing #EXTM3U header"
            exit 1
          fi
          
          echo "✅ M3U8 validated ($(wc -l < streams.m3u8) lines)"

      - name: Show playlist preview (sanitized for private repo)
        run: |
          echo ""
          echo "📄 Generated streams.m3u8 (sanitized preview):"
          echo "=========================="
          # Show only first 20 lines and mask sensitive URLs
          head -20 streams.m3u8 | sed 's|https://[^[:space:]]*|\*\*\*URL_HIDDEN\*\*\*|g'
          echo "..."

      - name: Send Telegram Notification
        uses: cbrgm/telegram-github-action@v1
        if: success() && steps.stats.outputs.total != '0'
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            📺 *YouTube Playlist Updated*
            
            ✅ *Active Streams:* ${{ steps.stats.outputs.active }}/${{ steps.stats.outputs.total }}
            
            📊 *Quality Breakdown:*
            • 1080p: ${{ steps.stats.outputs.quality_1080p }}
            • 720p: ${{ steps.stats.outputs.quality_720p }}
            • 480p: ${{ steps.stats.outputs.quality_480p }}
            
            📡 *Live Channels:*
            ${{ steps.stats.outputs.active_channels }}
            
            ⚫ *Offline:*
            ${{ steps.stats.outputs.offline_channels }}
            
            🔒 *Repository:* Private
            🕐 *Updated:* ${{ github.event.head_commit.timestamp || 'Scheduled run' }}
        continue-on-error: true

      - name: Commit and push with pull and retry
        env:
          PAT_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Re-enable credentials for push
          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git"
          
          git add -f streams.m3u8 stats.txt
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git commit -m "🔄 Update HD playlist [$(date -u +%H:%M)] - ${{ steps.stats.outputs.active }}/${{ steps.stats.outputs.total }} active"
          
          # Pull and push with retry logic
          MAX_RETRIES=5
          DELAY=10
          SUCCESS=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "📤 Attempt $i/$MAX_RETRIES: Pulling latest changes..."
            
            # Try rebase first, fallback to merge
            if ! git pull --rebase origin main 2>/dev/null; then
              echo "⚠️ Rebase failed, trying merge..."
              git pull origin main || true
            fi
            
            echo "📤 Push attempt $i/$MAX_RETRIES..."
            if git push origin HEAD:main; then
              echo "✅ Successfully pushed on attempt $i"
              SUCCESS=true
              break
            else
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️ Push failed, waiting ${DELAY}s before retry..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              fi
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ All push attempts failed after $MAX_RETRIES retries"
            exit 1
          fi

      - name: Cleanup sensitive files
        if: always()
        run: |
          shred -u cookies.txt 2>/dev/null || rm -f cookies.txt
          shred -u stats.txt 2>/dev/null || rm -f stats.txt
          shred -u wgcf-profile.conf 2>/dev/null || rm -f wgcf-profile.conf
          # Clear shell history to prevent credential leakage
          history -c 2>/dev/null || true
          echo "🧹 Cleaned up temporary files"

      - name: Send failure notification
        if: failure()
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            ❌ *Workflow Failed*
            
            Repository: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Please check the logs for details.
        continue-on-error: true
