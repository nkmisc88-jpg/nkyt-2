name: YouTube Live M3U8 Generator
run-name: Generate playlist with WARP 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Global timeout for entire job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Setup Cloudflare WARP
        timeout-minutes: 3
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iptables
          
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          
          wgcf register --accept-tos
          wgcf generate
          
          # Fix config
          sed -i 's/AllowedIPs = 0.0.0.0\/0,::\/0/AllowedIPs = 0.0.0.0\/0/' wgcf-profile.conf
          sed -i '/Address = fd/d' wgcf-profile.conf
          sed -i '/DNS = /d' wgcf-profile.conf
          sed -i 's/MTU = 1280/MTU = 1420/' wgcf-profile.conf
          
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          
          # Start with timeout
          timeout 25 sudo wg-quick up /etc/wireguard/wgcf.conf || {
            echo "⚠️ wg-quick failed, trying manual setup..."
            sudo ip link add dev wgcf type wireguard
            sudo ip address add dev wgcf $(grep 'Address = ' wgcf-profile.conf | grep -oE '172\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+')
            sudo wg setconf wgcf /etc/wireguard/wgcf.conf
            sudo ip link set mtu 1420 up dev wgcf
            sudo ip route add default dev wgcf table 200 2>/dev/null || true
            sudo ip rule add from $(grep 'Address = ' wgcf-profile.conf | grep -oE '172\.[0-9]+\.[0-9]+\.[0-9]+' | head -1) table 200 2>/dev/null || true
          }
          
          sleep 3
          echo "🔍 WARP status:"
          curl -s --max-time 8 https://cloudflare.com/cdn-cgi/trace | grep -E "ip|warp" || echo "WARP check failed"
          echo "🌐 Current IP: $(curl -s --max-time 8 https://ipinfo.io/ip)"

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          echo "$COOKIES" > cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate playlist
        timeout-minutes: 20  # Timeout for Python script
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          import subprocess
          from datetime import datetime, timezone
          import sys

          def get_stream_url(url, cookies_file):
              """Extract direct stream URL from YouTube channel with better error handling"""
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 20,
                  'extract_flat': False,
                  'source_address': '0.0.0.0',
                  'extractor_args': {
                      'youtube': {
                          'player_skip': ['webpage', 'config', 'js'],
                          'player_client': ['android', 'web'],
                      }
                  },
              }
              
              last_error = None
              
              for attempt in range(3):  # Reduced from 5 to 3
                  delay = min(10 * (2 ** attempt) + random.randint(0, 5), 60)  # Shorter delays
                  print(f"  ⏱️ Attempt {attempt + 1}/3 - waiting {delay}s...")
                  time.sleep(delay)
                  
                  try:
                      with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                          info = ydl.extract_info(url, download=False)
                          
                          if not info:
                              print("  ⚠️ No info returned")
                              continue
                          
                          # Check if it's a channel with live tab
                          if info.get('_type') == 'playlist' or 'entries' in info:
                              print(f"  ℹ️ Got playlist, looking for live stream...")
                              entries = info.get('entries', [])
                              live_entry = None
                              for entry in entries:
                                  if entry and entry.get('is_live'):
                                      live_entry = entry
                                      break
                              
                              if not live_entry:
                                  print("  ⚠️ No live stream found in channel")
                                  return None, info.get('title', 'Unknown')
                              
                              info = live_entry
                          
                          is_live = info.get('is_live', False)
                          live_status = info.get('live_status', '')
                          
                          if not (is_live or live_status == 'is_live'):
                              print(f"  ⚠️ Not currently live (status: {live_status})")
                              return None, info.get('title', 'Unknown')
                          
                          video_id = info.get('id')
                          if not video_id:
                              print("  ⚠️ No video ID found")
                              continue
                          
                          print(f"  ✅ Got video ID: {video_id}")
                          time.sleep(2)
                          
                          # Get formats
                          formats = info.get('formats', [])
                          
                          # Priority: m3u8 formats
                          for fmt in formats:
                              if fmt.get('protocol') in ['m3u8', 'm3u8_native'] and fmt.get('url'):
                                  print(f"    📊 Found m3u8: {fmt.get('format_note', 'unknown')}")
                                  return fmt['url'], info.get('title', 'Unknown')
                          
                          # Try yt-dlp's url extraction
                          if info.get('url'):
                              return info['url'], info.get('title', 'Unknown')
                          
                          # Fallback formats
                          for fmt_id in ['301', '300', '94', 'best']:
                              try:
                                  with yt_dlp.YoutubeDL({**ydl_opts, 'format': fmt_id}) as ydl2:
                                      info2 = ydl2.extract_info(f"https://youtube.com/watch?v={video_id}", download=False)
                                      if info2 and info2.get('url'):
                                          print(f"    ✅ Format {fmt_id}")
                                          return info2['url'], info.get('title', 'Unknown')
                              except Exception as fmt_e:
                                  continue
                  
                  except yt_dlp.utils.DownloadError as e:
                      error_str = str(e)
                      last_error = error_str
                      print(f"  ❌ DownloadError: {error_str[:100]}")
                      
                      # Don't retry on 404 or channel not found
                      if '404' in error_str or 'not found' in error_str.lower():
                          print("  🚫 Channel not found (404), skipping retries")
                          break
                      if 'bot' in error_str.lower() or 'sign in' in error_str.lower():
                          print("  ⚠️ Bot detection!")
                          break
                  
                  except Exception as e:
                      print(f"  ❌ Error: {str(e)[:100]}")
                      last_error = str(e)
              
              return None, None

          # Main execution
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              sys.exit(1)

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          if not lines:
              print("⚠️ No streams found")
              sys.exit(0)

          m3u8 = [
              "#EXTM3U",
              f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Total channels: {len(lines)}",
              ""
          ]

          total = active = 0

          for line in lines:
              # Validate URL format
              url_match = re.search(r'(https?://(?:www\.)?youtube\.com/[^\s]+)', line)
              if not url_match:
                  # Try to construct URL from handle
                  handle_match = re.search(r'@([^\s/]+)', line)
                  if handle_match:
                      url = f"https://youtube.com/@{handle_match.group(1)}/live"
                      print(f"\n📺 Constructed URL for @{handle_match.group(1)}")
                  else:
                      print(f"\n⚠️ Invalid line: {line[:50]}")
                      continue
              else:
                  url = url_match.group(1)
              
              total += 1
              
              # Extract name
              name_match = re.search(r'@([^/]+)', url)
              name = name_match.group(1) if name_match else f"Channel {total}"
              
              print(f"\n📺 [{total}/{len(lines)}] {name}")
              print(f"    URL: {url}")
              
              # Add timeout to prevent hanging on single channel
              stream_url = None
              title = None
              
              try:
                  # Use signal-based timeout if possible, otherwise rely on socket_timeout
                  stream_url, title = get_stream_url(url, 'cookies.txt')
              except Exception as e:
                  print(f"  ❌ Exception: {str(e)[:100]}")
              
              if stream_url:
                  active += 1
                  print(f"  ✅ SUCCESS")
                  m3u8.extend([
                      f"#EXTINF:-1 tvg-name=\"{name}\" group-title=\"YouTube Live\",{name} (Live)",
                      stream_url,
                      ""
                  ])
              else:
                  print(f"  ⚠️ FAILED - using fallback")
                  m3u8.extend([
                      f"#EXTINF:-1 tvg-name=\"{name}\" group-title=\"YouTube Live\",{name} (Offline)",
                      url,
                      ""
                  ])
              
              if total < len(lines):
                  cooldown = random.randint(60, 120)  # Shorter cooldown
                  print(f"  ⏱️ Cooldown: {cooldown}s")
                  time.sleep(cooldown)

          m3u8.extend([
              "",
              f"# Summary: {active}/{total} active",
              f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"
          ])

          with open('streams.m3u8', 'w') as f:
              f.write('\n'.join(m3u8))

          print(f"\n📊 SUMMARY: {active}/{total} streams active")

          PYTHON_EOF

          python generate.py

      - name: Show playlist preview
        run: |
          echo ""
          echo "📄 Generated streams.m3u8:"
          head -20 streams.m3u8
          echo "..."
          wc -l streams.m3u8

      - name: Cleanup & Commit
        if: always()  # Run even if previous steps failed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f cookies.txt generate.py wgcf-profile.conf wgcf-account.toml
          sudo wg-quick down /etc/wireguard/wgcf.conf 2>/dev/null || true
          sudo ip link del dev wgcf 2>/dev/null || true
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add streams.m3u8
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          ACTIVE_COUNT=$(grep -c '^http' streams.m3u8 || echo "0")
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)] - ${ACTIVE_COUNT} streams"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Done"
